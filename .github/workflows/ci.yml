name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - name: Block eslint-disable comments
        run: |
          if git grep -n "eslint-disable" -- "*.ts" "*.tsx" "*.js" "*.jsx"; then
            echo "eslint-disable comments are not allowed."
            exit 1
          fi
      - run: npm run test:ci
      - run: npm run build
      - run: npm run size
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
        continue-on-error: true
